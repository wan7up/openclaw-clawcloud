name: update-release-pages

permissions:
  contents: write
  packages: read

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - publish-openclaw-packages
    types:
      - completed

jobs:
  refresh:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load package baseline state
        id: state
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          p = Path('memory/openclaw-package-baselines.json')
          data = json.loads(p.read_text())
          upstream = data['upstream_version']
          print(f"upstream_version={upstream}")
          print(f"clawcloud_image=ghcr.io/${{ github.repository_owner }}/openclaw-clawcloud:v{upstream}")
          print(f"clawcloud_latest=ghcr.io/${{ github.repository_owner }}/openclaw-clawcloud:latest")
          print(f"arm64_image=ghcr.io/${{ github.repository_owner }}/openclaw-arm64:{upstream}-manual-devices-v9")
          print(f"arm64_latest=ghcr.io/${{ github.repository_owner }}/openclaw-arm64:latest-manual-devices-v9")
          PY

      - name: Render release notes
        run: |
          cat > /tmp/release-notes.md <<EOF
          # 最新镜像下载信息

          这个仓库提供两个**基于 OpenClaw 官方镜像**修改的适配版本镜像，分别对应不同部署环境与机型。

          ## ClawCloud Run 适配版
          - 版本标签：`${{ steps.state.outputs.clawcloud_image }}`
          - 滚动标签：`${{ steps.state.outputs.clawcloud_latest }}`
          - 说明：针对 ClawCloud Run 运行环境做适配的修改版本。

          ### ClawCloud Run → Create App 页面填写
          - Image Name：`${{ steps.state.outputs.clawcloud_image }}`
          - Port：`8080`
          - Local Storage 挂载路径：`/data`
          - 建议环境变量：

          ```env
          OPENCLAW_GATEWAY_TOKEN=replace-me
          OPENCLAW_ALLOWED_ORIGIN=https://your-app.us-west-1.clawcloudrun.com
          OPENCLAW_STATE_DIR=/data/.openclaw
          OPENCLAW_WORKSPACE_DIR=/data/workspace
          OPENCLAW_GATEWAY_PORT=18789
          PORT=8080
          OPENAI_API_KEY=replace-me
          ```

          ## ARM64 适配版
          - 版本标签：`${{ steps.state.outputs.arm64_image }}`
          - 滚动标签：`${{ steps.state.outputs.arm64_latest }}`
          - 说明：基于 OpenClaw 官方镜像调整为更适合 ARM64 机型使用的修改版本。

          ### ARM64 `docker run` 示例
          ```bash
          docker run -d \
            --name openclaw-arm64 \
            --restart unless-stopped \
            -p 18789:18789 \
            --env-file /storage/openclaw/.env \
            -e HOME=/data \
            -e OPENCLAW_GATEWAY_BIND=lan \
            -e OPENCLAW_CONFIG_MODE=manual \
            -e OPENCLAW_MANUAL_DEVICES=1 \
            -v /storage/openclaw:/data \
            ${{ steps.state.outputs.arm64_image }}
          ```

          ## 浏览器授权（pairing）关键命令
          ### 查询 request id
          ```bash
          cat /data/.openclaw/devices/pending.json
          ```

          ### 执行授权
          ```bash
          openclaw gateway call device.pair.approve --params '{"requestId":"REQUEST_ID"}'
          ```

          ### 查看授权结果
          ```bash
          cat /data/.openclaw/devices/paired.json
          ```

          ## 上游基础版本
          - OpenClaw `${{ steps.state.outputs.upstream_version }}`
          EOF

      - name: Create or update rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view latest-packages >/dev/null 2>&1; then
            gh release edit latest-packages \
              --title "最新镜像下载信息" \
              --notes-file /tmp/release-notes.md
          else
            gh release create latest-packages \
              --title "最新镜像下载信息" \
              --notes-file /tmp/release-notes.md
          fi

      - name: Mark rolling release as Latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit latest-packages --latest
