name: publish-openclaw-packages

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'deploy/clawcloudrun-openclaw/**'
      - 'deploy/openclaw-arm64/**'
      - 'scripts/sync_openclaw_package_bases.py'
      - 'scripts/make_arm_v8_descriptor.py'
      - 'memory/openclaw-package-baselines.json'
      - '.github/workflows/publish-openclaw-packages.yml'
      - '.github/workflows/sync-openclaw-package-bases.yml'
  workflow_dispatch:

concurrency:
  group: publish-openclaw-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load package baseline state
        id: state
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          p = Path('memory/openclaw-package-baselines.json')
          data = json.loads(p.read_text())
          upstream = data['upstream_version']
          owner = '${{ github.repository_owner }}'
          print(f"upstream_version={upstream}")
          print(f"clawcloud_repo=ghcr.io/{owner}/openclaw-clawcloud")
          print(f"arm64_repo=ghcr.io/{owner}/openclaw-arm64")
          print(f"clawcloud_version_tag=v{upstream}")
          print(f"arm64_version_tag={upstream}-manual-devices-v8")
          print("clawcloud_latest_tag=latest")
          print("arm64_latest_tag=latest-manual-devices-v8")
          PY

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push task 001 / ClawCloud Run package
        uses: docker/build-push-action@v6
        with:
          context: deploy/clawcloudrun-openclaw
          file: deploy/clawcloudrun-openclaw/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.state.outputs.clawcloud_repo }}:${{ steps.state.outputs.clawcloud_version_tag }}
            ${{ steps.state.outputs.clawcloud_repo }}:${{ steps.state.outputs.clawcloud_latest_tag }}

      - name: Build and push task 004 / ARM64 package
        uses: docker/build-push-action@v6
        with:
          context: deploy/openclaw-arm64
          file: deploy/openclaw-arm64/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.state.outputs.arm64_repo }}:${{ steps.state.outputs.arm64_version_tag }}
            ${{ steps.state.outputs.arm64_repo }}:${{ steps.state.outputs.arm64_latest_tag }}

      - name: Rewrite ARM64 tags as linux/arm/v8-compatible manifests
        run: |
          set -euo pipefail
          for tag in "${{ steps.state.outputs.arm64_version_tag }}" "${{ steps.state.outputs.arm64_latest_tag }}"; do
            image="${{ steps.state.outputs.arm64_repo }}:${tag}"
            descriptor="/tmp/${tag//[^a-zA-Z0-9_.-]/_}-arm-v8.json"
            python3 scripts/make_arm_v8_descriptor.py --image "$image" --output "$descriptor"
            docker buildx imagetools create -f "$descriptor" -t "$image"
          done

      - name: Show published refs
        run: |
          echo "ClawCloud package: ${{ steps.state.outputs.clawcloud_repo }}:${{ steps.state.outputs.clawcloud_version_tag }}"
          echo "ClawCloud latest:  ${{ steps.state.outputs.clawcloud_repo }}:${{ steps.state.outputs.clawcloud_latest_tag }}"
          echo "ARM64 package:     ${{ steps.state.outputs.arm64_repo }}:${{ steps.state.outputs.arm64_version_tag }}"
          echo "ARM64 latest:      ${{ steps.state.outputs.arm64_repo }}:${{ steps.state.outputs.arm64_latest_tag }}"
